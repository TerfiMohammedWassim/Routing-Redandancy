# ═══════════════════════════════════════════════════════════════════════════
# PLAYBOOK AUTONOME — SW4 (Cumulus VX 4.x)
# Rôle : Core switch L3 MLAG secondary — prend le relai si SW3 tombe
#
# Câblage :
#   swp1+swp2  → peerlink vers SW3 (swp3+swp4)
#   swp3       → SW1 swp6  ┐ bond_access dual-homed (clag-id 10)
#   swp4       → SW2 swp6  ┘
#
# Usage : ansible-playbook -i "IP_SW4," sw4.yml -u cumulus -k --become
# ═══════════════════════════════════════════════════════════════════════════
---
- name: Configuration complète SW4
  hosts: sw4
  gather_facts: false
  become: false

  vars:

    hostname: sw4
    loopback_ip: "10.10.10.4/32"

    mlag:
      role: secondary
      sys_mac: "44:38:39:FF:03:03"       # DOIT être identique à SW3
      peerlink_name: peerlink
      peerlink_members:
        - swp1
        - swp2
      peerlink_ip: "169.254.2.2/30"      # inversé par rapport à SW3
      peer_ip: "169.254.2.1"
      # backup_ip désactivé temporairement - non requis si peerlink fiable
      # backup_ip: "10.10.10.3"
      keepalive_ip: "10.10.10.4/32"

    # clag-id DOIT être identique à SW3 — même bond dual-homed
    mlag_bonds:
      - name: bond_access
        slaves:
          - swp3    # vers SW1 swp6
          - swp4    # vers SW2 swp6
        clag_id: 10
        description: "Dual-homed depuis SW1+SW2 (clag-id 10)"

    bridge:
      name: bridge
      vids: "10,20"
      pvid: 1

    # Mêmes IPs que SW3 — clagd gère le virtual MAC partagé
    svi_interfaces:
      - vlan_id: 10
        ip_address: "192.168.1.254/24"
        description: "Passerelle VLAN10 — Machine1"
      - vlan_id: 20
        ip_address: "192.168.2.254/24"
        description: "Passerelle VLAN20 — Machine2"

    sysctl_settings:
      - name: net.ipv4.ip_forward
        value: "1"
      - name: net.ipv4.conf.all.rp_filter
        value: "0"
      - name: net.ipv4.conf.default.rp_filter
        value: "0"
      - name: net.core.netdev_max_backlog
        value: "1000"

  tasks:

    - name: "[SYS] Définir le hostname"
      hostname:
        name: "{{ hostname }}"

    - name: "[SYS] Mettre à jour /etc/hosts"
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ hostname }}"
        state: present

    - name: "[SYS] Appliquer les paramètres sysctl"
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-campus.conf
      loop: "{{ sysctl_settings }}"

    - name: "[SYS] Vérifier ip_forward actif"
      command: sysctl net.ipv4.ip_forward
      register: ip_fwd
      changed_when: false

    - name: "[SYS] Confirmer ip_forward = 1"
      assert:
        that: "'= 1' in ip_fwd.stdout"
        fail_msg: "ERREUR CRITIQUE : ip_forward non activé sur SW4"
        success_msg: "OK : ip_forward = 1 ✓"

    - name: "[NET] Sauvegarder l'ancien fichier interfaces"
      copy:
        src: /etc/network/interfaces
        dest: "/etc/network/interfaces.bak.{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
        remote_src: true
      ignore_errors: true

    - name: "[NET] Déployer /etc/network/interfaces"
      copy:
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: '0644'
        content: |
          # /etc/network/interfaces — {{ hostname }}
          # Généré par Ansible — {{ lookup('pipe', 'date') }}

          auto lo
          iface lo inet loopback
              address {{ loopback_ip }}

          auto eth0
          iface eth0 inet dhcp

          # ─────────────────────────────────────────────────────
          # PEERLINK MLAG avec SW3 (swp49+swp50)
          # ─────────────────────────────────────────────────────
          {% for port in mlag.peerlink_members %}
          auto {{ port }}
          iface {{ port }}

          {% endfor %}
          auto {{ mlag.peerlink_name }}
          iface {{ mlag.peerlink_name }}
              bond-slaves {{ mlag.peerlink_members | join(' ') }}
              bond-mode 802.3ad
              bond-miimon 100
              bond-lacp-rate fast
              bond-min-links 1

          auto {{ mlag.peerlink_name }}.4094
          iface {{ mlag.peerlink_name }}.4094
              clagd-enable yes
              clagd-peer-ip {{ mlag.peer_ip }}
              clagd-sys-mac {{ mlag.sys_mac }}
              clagd-priority 32768
              clagd-args --initDelay 0
              address {{ mlag.peerlink_ip }}

          # ─────────────────────────────────────────────────────
          # BOND MLAG dual-homed vers SW1+SW2
          # Ce bond reçoit le trafic de bond_core de SW1 (swp6) et SW2 (swp6)
          # Le clag-id 10 doit correspondre au clag-id du bond_core côté access
          # ─────────────────────────────────────────────────────
          {% for bond in mlag_bonds %}
          # {{ bond.description }}
          {% for slave in bond.slaves %}
          auto {{ slave }}
          iface {{ slave }}

          {% endfor %}
          auto {{ bond.name }}
          iface {{ bond.name }}
              bond-slaves {{ bond.slaves | join(' ') }}
              bond-mode 802.3ad
              bond-miimon 100
              bond-lacp-rate fast
              bond-min-links 1
              clag-id {{ bond.clag_id }}
              bridge-vids {{ bridge.vids }}

          {% endfor %}
          # ─────────────────────────────────────────────────────
          # BRIDGE VLAN-aware
          # ─────────────────────────────────────────────────────
          auto {{ bridge.name }}
          iface {{ bridge.name }}
              bridge-vlan-aware yes
              bridge-ports {{ mlag_bonds | map(attribute='name') | join(' ') }} {{ mlag.peerlink_name }}
              bridge-vids {{ bridge.vids }}
              bridge-pvid {{ bridge.pvid }}

          # ─────────────────────────────────────────────────────
          # SVIs — mêmes IPs que SW3 (anycast gateway MLAG)
          # ─────────────────────────────────────────────────────
          {% for svi in svi_interfaces %}
          # {{ svi.description }}
          auto vlan{{ svi.vlan_id }}
          iface vlan{{ svi.vlan_id }} inet static
              address {{ svi.ip_address }}
              vlan-id {{ svi.vlan_id }}
              vlan-raw-device {{ bridge.name }}

          {% endfor %}

    # ════════════════════════════════════════════════════════════════════
    # RELOAD — async pour éviter coupure SSH
    # ════════════════════════════════════════════════════════════════════

    - name: "[NET] Sauvegarder l'IP eth0"
      shell: ip addr show eth0 | grep 'inet ' | awk '{print $2}' | cut -d/ -f1
      register: eth0_ip
      changed_when: false

    - name: "[NET] Sauvegarder la gateway eth0"
      shell: ip route show default | awk '/default/ {print $3}' | head -1
      register: eth0_gw
      changed_when: false

    - name: "[NET] Recharger les interfaces (async)"
      shell: |
        sleep 2
        ifreload -a || true
        ip addr show eth0 | grep -q '{{ eth0_ip.stdout }}' || \
          ip addr add {{ eth0_ip.stdout }}/24 dev eth0 || true
        ip route show default | grep -q default || \
          ip route add default via {{ eth0_gw.stdout }} || true
      async: 45
      poll: 0

    - name: "[NET] Attendre que SW4 revienne (15s)"
      pause:
        seconds: 15

    - name: "[NET] Vérifier que SW4 est joignable"
      wait_for_connection:
        timeout: 45

    - name: "[MLAG] Attendre démarrage clagd (5s)"
      wait_for:
        timeout: 5
      delegate_to: localhost

    - name: "[MLAG] Vérifier l'état clagd"
      command: clagctl status
      register: clag_status
      changed_when: false
      ignore_errors: true

    - name: "[MLAG] Afficher l'état MLAG"
      debug:
        msg: "{{ clag_status.stdout_lines }}"

    - name: "[MLAG] Vérifier peer SW3 alive"
      assert:
        that: "'peer is alive' in clag_status.stdout"
        fail_msg: "AVERTISSEMENT : peer SW3 non détecté"
        success_msg: "OK : peer SW3 détecté ✓"
      ignore_errors: true

    - name: "[SVI] Vérifier les SVIs"
      command: "ip addr show vlan{{ item.vlan_id }}"
      register: svi_check
      changed_when: false
      loop: "{{ svi_interfaces }}"

    - name: "[SVI] Afficher l'état des SVIs"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ svi_check.results }}"

    - name: "[SVI] Confirmer IP présente"
      assert:
        that: "item.item.ip_address.split('/')[0] in item.stdout"
        fail_msg: "ERREUR : IP {{ item.item.ip_address }} absente de vlan{{ item.item.vlan_id }}"
        success_msg: "OK : vlan{{ item.item.vlan_id }} → {{ item.item.ip_address }} ✓"
      loop: "{{ svi_check.results }}"

    - name: "[CHECK] État de toutes les interfaces"
      command: net show interface all
      register: iface_all
      changed_when: false
      ignore_errors: true

    - name: "[CHECK] Afficher les interfaces"
      debug:
        msg: "{{ iface_all.stdout_lines }}"

    - name: "[CHECK] VLANs sur le bridge"
      command: bridge vlan show
      register: bridge_vlans
      changed_when: false

    - name: "[CHECK] Afficher les VLANs"
      debug:
        msg: "{{ bridge_vlans.stdout_lines }}"

    - name: "[CHECK] Table de routage"
      command: ip route show
      register: route_table
      changed_when: false

    - name: "[CHECK] Afficher les routes"
      debug:
        msg: "{{ route_table.stdout_lines }}"

    - name: "[CHECK] Résumé final SW4"
      debug:
        msg:
          - "════════════════════════════════════════════"
          - "  SW4 configuré — RÉSUMÉ"
          - "════════════════════════════════════════════"
          - "  Hostname        : {{ hostname }}"
          - "  Loopback        : {{ loopback_ip }}"
          - "  ip_forward      : 1"
          - "  MLAG Role       : {{ mlag.role }}"
          - "  clagd-priority  : 32768 (secondary)"
          - "  Peerlink (SW3)  : {{ mlag.peerlink_members | join('+') }}, {{ mlag.peerlink_ip }} ↔ {{ mlag.peer_ip }}"
          - "  bond_access     : swp3+swp4, clag-id 10 ← SW1/SW2"
          - "  SVI vlan10      : 192.168.1.254/24"
          - "  SVI vlan20      : 192.168.2.254/24"
          - "  Statut MLAG     : {{ 'peer alive ✓' if 'peer is alive' in clag_status.stdout else 'peer absent ✗' }}"
          - "════════════════════════════════════════════"

  handlers:
    - name: Recharger la configuration réseau
      command: ifreload -a
      listen: "Recharger la configuration réseau"

    - name: Redémarrer clagd
      systemd:
        name: clagd
        state: restarted
      listen: "Redémarrer clagd"

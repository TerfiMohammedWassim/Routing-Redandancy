# ═══════════════════════════════════════════════════════════════════════════
# PLAYBOOK AUTONOME — SW3 (Cumulus VX 4.x)
# Rôle : Core switch L3 — routage inter-VLAN par routes statiques
# Usage : ansible-playbook -i "IP_SW3," sw3.yml -u cumulus -k --become
# ═══════════════════════════════════════════════════════════════════════════
---
- name: Configuration complète SW3
  hosts: all
  gather_facts: false
  become: true

  vars:

    # ── Identité système ──────────────────────────────────────────────────
    hostname: sw3
    loopback_ip: "10.10.10.3/32"

    # ── Uplinks depuis SW1 et SW2 ─────────────────────────────────────────
    uplink_ports:
      - swp1    # vers SW1 swp5
      - swp2    # vers SW2 swp5

    # ── Bridge ────────────────────────────────────────────────────────────
    bridge:
      name: bridge
      vids: "10,20"
      pvid: 1

    # ── SVIs — interfaces L3 par VLAN ─────────────────────────────────────
    svi_interfaces:
      - vlan_id: 10
        ip_address: "192.168.1.254/24"
        description: "Passerelle VLAN10 — Machine1"
      - vlan_id: 20
        ip_address: "192.168.2.254/24"
        description: "Passerelle VLAN20 — Machine2"

    # ── Routes statiques inter-VLAN ───────────────────────────────────────
    # Les routes directement connectées sont créées automatiquement par les SVIs
    # On ajoute ici des routes explicites pour la clarté et la persistance
    static_routes:
      - prefix: "192.168.1.0/24"
        dev: vlan10
        description: "Réseau Machine1"
      - prefix: "192.168.2.0/24"
        dev: vlan20
        description: "Réseau Machine2"

    # ── Sysctl — forwarding IP obligatoire sur SW3 ────────────────────────
    sysctl_settings:
      - name: net.ipv4.ip_forward
        value: "1"                         # OBLIGATOIRE pour le routage inter-VLAN
      - name: net.ipv4.conf.all.rp_filter
        value: "0"                         # Désactiver rp_filter pour le routage VLAN
      - name: net.ipv4.conf.default.rp_filter
        value: "0"
      - name: net.core.netdev_max_backlog
        value: "1000"

  tasks:

    # ════════════════════════════════════════════════════════════════════
    # 1. PARAMÈTRES SYSTÈME
    # ════════════════════════════════════════════════════════════════════

    - name: "[SYS] Définir le hostname"
      hostname:
        name: "{{ hostname }}"

    - name: "[SYS] Mettre à jour /etc/hosts"
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ hostname }}"
        state: present

    - name: "[SYS] Appliquer les paramètres sysctl"
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-campus.conf
      loop: "{{ sysctl_settings }}"

    - name: "[SYS] Vérifier ip_forward actif"
      command: sysctl net.ipv4.ip_forward
      register: ip_fwd
      changed_when: false

    - name: "[SYS] Confirmer ip_forward = 1"
      assert:
        that: "'= 1' in ip_fwd.stdout"
        fail_msg: "ERREUR CRITIQUE : ip_forward non activé sur SW3 — le routage inter-VLAN ne fonctionnera pas"
        success_msg: "OK : ip_forward = 1 ✓"

    # ════════════════════════════════════════════════════════════════════
    # 2. INTERFACES RÉSEAU (SVIs + bridge)
    # ════════════════════════════════════════════════════════════════════

    - name: "[NET] Sauvegarder l'ancien fichier interfaces"
      copy:
        src: /etc/network/interfaces
        dest: "/etc/network/interfaces.bak.{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
        remote_src: true
      ignore_errors: true

    - name: "[NET] Déployer /etc/network/interfaces"
      copy:
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: '0644'
        content: |
          # /etc/network/interfaces — {{ hostname }}
          # Généré par Ansible — {{ lookup('pipe', 'date') }}
          # Rôle : commutateur L3, routage inter-VLAN statique

          auto lo
          iface lo inet loopback
              address {{ loopback_ip }}

          auto eth0
          iface eth0 inet dhcp

          # ── Uplinks depuis SW1 et SW2 (trunk VLAN 10,20) ────────────
          {% for port in uplink_ports %}
          auto {{ port }}
          iface {{ port }}

          {% endfor %}
          # ── Bridge VLAN-aware ────────────────────────────────────────
          auto {{ bridge.name }}
          iface {{ bridge.name }}
              bridge-vlan-aware yes
              bridge-ports {{ uplink_ports | join(' ') }}
              bridge-vids {{ bridge.vids }}
              bridge-pvid {{ bridge.pvid }}

          # ── SVIs (interfaces L3) ─────────────────────────────────────
          {% for svi in svi_interfaces %}
          # {{ svi.description }}
          auto vlan{{ svi.vlan_id }}
          iface vlan{{ svi.vlan_id }} inet static
              address {{ svi.ip_address }}
              vlan-id {{ svi.vlan_id }}
              vlan-raw-device {{ bridge.name }}

          {% endfor %}

    - name: "[NET] Recharger les interfaces"
      command: ifreload -a
      changed_when: true

    - name: "[NET] Attendre que les SVIs soient UP (3s)"
      wait_for:
        timeout: 3
      delegate_to: localhost

    - name: "[NET] Vérifier les SVIs"
      command: "ip addr show vlan{{ item.vlan_id }}"
      register: svi_check
      changed_when: false
      loop: "{{ svi_interfaces }}"

    - name: "[NET] Afficher l'état des SVIs"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ svi_check.results }}"

    - name: "[NET] Confirmer IP présente sur chaque SVI"
      assert:
        that: "item.item.ip_address.split('/')[0] in item.stdout"
        fail_msg: "ERREUR : IP {{ item.item.ip_address }} absente de vlan{{ item.item.vlan_id }}"
        success_msg: "OK : vlan{{ item.item.vlan_id }} → {{ item.item.ip_address }} ✓"
      loop: "{{ svi_check.results }}"

    # ════════════════════════════════════════════════════════════════════
    # 3. ROUTES STATIQUES
    # ════════════════════════════════════════════════════════════════════

    - name: "[ROUTE] Vérifier la table de routage"
      command: ip route show
      register: route_table
      changed_when: false

    - name: "[ROUTE] Afficher les routes"
      debug:
        msg: "{{ route_table.stdout_lines }}"

    - name: "[ROUTE] Confirmer routes directes présentes"
      assert:
        that: "item.prefix.split('/')[0].rsplit('.', 1)[0] in route_table.stdout"
        fail_msg: "AVERTISSEMENT : route {{ item.prefix }} non trouvée"
        success_msg: "OK : route {{ item.prefix }} via {{ item.dev }} présente ✓"
      loop: "{{ static_routes }}"
      ignore_errors: true

    - name: "[ROUTE] Vérifier la table ARP"
      command: ip neigh show
      register: arp_table
      changed_when: false

    - name: "[ROUTE] Afficher la table ARP"
      debug:
        msg: "{{ arp_table.stdout_lines }}"

    # ════════════════════════════════════════════════════════════════════
    # 4. VÉRIFICATION FINALE
    # ════════════════════════════════════════════════════════════════════

    - name: "[CHECK] État de toutes les interfaces"
      command: net show interface all
      register: iface_all
      changed_when: false

    - name: "[CHECK] Afficher les interfaces"
      debug:
        msg: "{{ iface_all.stdout_lines }}"

    - name: "[CHECK] VLANs sur le bridge"
      command: bridge vlan show
      register: bridge_vlans
      changed_when: false

    - name: "[CHECK] Afficher les VLANs"
      debug:
        msg: "{{ bridge_vlans.stdout_lines }}"

    - name: "[CHECK] Résumé final SW3"
      debug:
        msg:
          - "════════════════════════════════════════════"
          - "  SW3 configuré — RÉSUMÉ"
          - "════════════════════════════════════════════"
          - "  Hostname       : {{ hostname }}"
          - "  Loopback       : {{ loopback_ip }}"
          - "  ip_forward     : 1 (routage actif)"
          - "  Uplinks        : {{ uplink_ports | join(', ') }}"
          - "  SVI vlan10     : 192.168.1.254/24 (GW Machine1)"
          - "  SVI vlan20     : 192.168.2.254/24 (GW Machine2)"
          - "  Route VLAN10   : 192.168.1.0/24 dev vlan10"
          - "  Route VLAN20   : 192.168.2.0/24 dev vlan20"
          - "════════════════════════════════════════════"

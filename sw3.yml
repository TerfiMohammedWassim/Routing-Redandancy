# ═══════════════════════════════════════════════════════════════════════════
# PLAYBOOK AUTONOME — SW3 (Cumulus VX 4.x)
# Rôle : Core switch L3 MLAG primary — routage inter-VLAN + redundancy avec SW4
# Usage : ansible-playbook -i "IP_SW3," sw3.yml -u cumulus -k --become
# ═══════════════════════════════════════════════════════════════════════════
---
- name: Configuration complète SW3
  hosts: sw3
  gather_facts: false

  vars:

    # ── Identité système ──────────────────────────────────────────────────
    hostname: sw3
    loopback_ip: "10.10.10.3/32"

    # ── Paramètres MLAG (avec SW4) ────────────────────────────────────────
    mlag:
      role: primary
      sys_mac: "44:38:39:FF:03:03"       # MLAG avec SW4 — DOIT être identique
      peerlink_name: peerlink
      peerlink_members:
        - swp49
        - swp50
      peerlink_ip: "169.254.2.1/30"
      peer_ip: "169.254.2.2"
      backup_ip: "10.10.10.4"            # IP de keepalive SW4
      keepalive_ip: "10.10.10.3/32"

    # ── Bonds MLAG vers SW1 et SW2 ────────────────────────────────────────
    mlag_bonds:
      - name: bond_sw1
        slave: swp1
        clag_id: 1
        vlan: "10,20"
        description: "MLAG vers SW1"
      - name: bond_sw2
        slave: swp2
        clag_id: 2
        vlan: "10,20"
        description: "MLAG vers SW2"

    # ── Bridge ────────────────────────────────────────────────────────────
    bridge:
      name: bridge
      vids: "10,20"
      pvid: 1

    # ── SVIs — interfaces L3 par VLAN ─────────────────────────────────────
    svi_interfaces:
      - vlan_id: 10
        ip_address: "192.168.1.254/24"
        description: "Passerelle VLAN10 — Machine1"
      - vlan_id: 20
        ip_address: "192.168.2.254/24"
        description: "Passerelle VLAN20 — Machine2"

    # ── Routes statiques inter-VLAN ───────────────────────────────────────
    # Les routes directement connectées sont créées automatiquement par les SVIs
    # On ajoute ici des routes explicites pour la clarté et la persistance
    static_routes:
      - prefix: "192.168.1.0/24"
        dev: vlan10
        description: "Réseau Machine1"
      - prefix: "192.168.2.0/24"
        dev: vlan20
        description: "Réseau Machine2"

    # ── Sysctl — forwarding IP obligatoire sur SW3 ────────────────────────
    sysctl_settings:
      - name: net.ipv4.ip_forward
        value: "1"                         # OBLIGATOIRE pour le routage inter-VLAN
      - name: net.ipv4.conf.all.rp_filter
        value: "0"                         # Désactiver rp_filter pour le routage VLAN
      - name: net.ipv4.conf.default.rp_filter
        value: "0"
      - name: net.core.netdev_max_backlog
        value: "1000"

  tasks:

    # ════════════════════════════════════════════════════════════════════
    # 1. PARAMÈTRES SYSTÈME
    # ════════════════════════════════════════════════════════════════════

    - name: "[SYS] Définir le hostname"
      hostname:
        name: "{{ hostname }}"

    - name: "[SYS] Mettre à jour /etc/hosts"
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ hostname }}"
        state: present

    - name: "[SYS] Appliquer les paramètres sysctl"
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-campus.conf
      loop: "{{ sysctl_settings }}"

    - name: "[SYS] Vérifier ip_forward actif"
      command: sysctl net.ipv4.ip_forward
      register: ip_fwd
      changed_when: false

    - name: "[SYS] Confirmer ip_forward = 1"
      assert:
        that: "'= 1' in ip_fwd.stdout"
        fail_msg: "ERREUR CRITIQUE : ip_forward non activé sur SW3 — le routage inter-VLAN ne fonctionnera pas"
        success_msg: "OK : ip_forward = 1 ✓"

    # ════════════════════════════════════════════════════════════════════
    # 2. INTERFACES RÉSEAU (SVIs + bridge)
    # ════════════════════════════════════════════════════════════════════

    - name: "[NET] Sauvegarder l'ancien fichier interfaces"
      copy:
        src: /etc/network/interfaces
        dest: "/etc/network/interfaces.bak.{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
        remote_src: true
      ignore_errors: true

    - name: "[NET] Déployer /etc/network/interfaces"
      copy:
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: '0644'
        content: |
          # /etc/network/interfaces — {{ hostname }}
          # Généré par Ansible — {{ lookup('pipe', 'date') }}
          # Rôle : commutateur L3 MLAG primary, routage inter-VLAN

          auto lo
          iface lo inet loopback
              address {{ loopback_ip }}

          auto eth0
          iface eth0 inet dhcp

          # ─────────────────────────────────────────────────────
          # PEERLINK MLAG avec SW4 (swp49, swp50)
          # ─────────────────────────────────────────────────────
          auto swp49
          iface swp49

          auto swp50
          iface swp50

          auto peerlink
          iface peerlink inet static
              address {{ mlag.peerlink_ip }}
              bond-slaves swp49 swp50
              bond-mode active-backup
              bond-miimon 100
              bond-use-carrier yes

          auto peerlink.4094
          iface peerlink.4094 inet static
              address 169.254.3.1/30

          # ─────────────────────────────────────────────────────
          # MLAG Bonds vers SW1 et SW2
          # ─────────────────────────────────────────────────────
          auto swp1
          iface swp1

          auto swp2
          iface swp2

          auto bond_sw1
          iface bond_sw1 inet manual
              bond-slaves swp1
              bond-mode active-backup
              bond-miimon 100
              clag-id 1

          auto bond_sw2
          iface bond_sw2 inet manual
              bond-slaves swp2
              bond-mode active-backup
              bond-miimon 100
              clag-id 2

          # ─────────────────────────────────────────────────────
          # BRIDGE VLAN-aware (peerlink + bonds MLAG)
          # ─────────────────────────────────────────────────────
          auto {{ bridge.name }}
          iface {{ bridge.name }}
              bridge-vlan-aware yes
              bridge-ports peerlink bond_sw1 bond_sw2
              bridge-vids {{ bridge.vids }}
              bridge-pvid {{ bridge.pvid }}

          # ─────────────────────────────────────────────────────
          # SVIs (interfaces L3) pour routage inter-VLAN
          # ─────────────────────────────────────────────────────
          {% for svi in svi_interfaces %}
          # {{ svi.description }}
          auto vlan{{ svi.vlan_id }}
          iface vlan{{ svi.vlan_id }} inet static
              address {{ svi.ip_address }}
              vlan-id {{ svi.vlan_id }}
              vlan-raw-device {{ bridge.name }}

          {% endfor %}

    - name: "[NET] Recharger as interfaces"
      command: ifreload -a
      async: 20
      changed_when: true

    - name: "[NET] Attendre que les SVIs soient UP (3s)"
      wait_for:
        timeout: 3
      delegate_to: localhost

    # ════════════════════════════════════════════════════════════════════
    # 2.5 CLAGD (MLAG daemon) — configuration du keepalive
    # ════════════════════════════════════════════════════════════════════

    - name: "[CLAG] Créer le fichier /etc/cumulus/ports.conf"
      copy:
        dest: /etc/cumulus/ports.conf
        content: |
          # Cumulus Ports Configuration
          # swp49, swp50 sont réservés pour le peerlink
        backup: true

    - name: "[CLAG] Générer /etc/network/interfaces.d/clagd - SW3"
      copy:
        dest: /etc/network/interfaces.d/clagd
        content: |
          # Ansible managed — CLAGD pour SW3
          auto clagd
          iface clagd
            clagd-sys-mac {{ mlag.sys_mac }}
            clagd-primary-ip {{ mlag.peerlink_ip }}
            clagd-peer-ip {{ mlag.peer_ip }}
            clagd-backup-ip {{ mlag.backup_ip }}
            clagd-keepalive-ip {{ mlag.keepalive_ip }} peer {{ mlag.backup_ip }}
            clagd-priority 1000
            clagd-peer-as 65000
            clagd-vxlan disable
        backup: true
      notify: Redémarrer clagd

    - name: "[SVC] Démarrer le service clagd"
      systemd:
        name: clagd
        enabled: true
        state: started
      ignore_errors: true

    - name: "[NET] Vérifier les SVIs"
      command: "ip addr show vlan{{ item.vlan_id }}"
      register: svi_check
      changed_when: false
      loop: "{{ svi_interfaces }}"

    - name: "[NET] Afficher l'état des SVIs"
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ svi_check.results }}"

    - name: "[NET] Confirmer IP présente sur chaque SVI"
      assert:
        that: "item.item.ip_address.split('/')[0] in item.stdout"
        fail_msg: "ERREUR : IP {{ item.item.ip_address }} absente de vlan{{ item.item.vlan_id }}"
        success_msg: "OK : vlan{{ item.item.vlan_id }} → {{ item.item.ip_address }} ✓"
      loop: "{{ svi_check.results }}"

    # ════════════════════════════════════════════════════════════════════
    # 3. ROUTES STATIQUES
    # ════════════════════════════════════════════════════════════════════

    - name: "[ROUTE] Vérifier la table de routage"
      command: ip route show
      register: route_table
      changed_when: false

    - name: "[ROUTE] Afficher les routes"
      debug:
        msg: "{{ route_table.stdout_lines }}"

    - name: "[ROUTE] Confirmer routes directes présentes"
      assert:
        that: "item.prefix.split('/')[0].rsplit('.', 1)[0] in route_table.stdout"
        fail_msg: "AVERTISSEMENT : route {{ item.prefix }} non trouvée"
        success_msg: "OK : route {{ item.prefix }} via {{ item.dev }} présente ✓"
      loop: "{{ static_routes }}"
      ignore_errors: true

    - name: "[ROUTE] Vérifier la table ARP"
      command: ip neigh show
      register: arp_table
      changed_when: false

    - name: "[ROUTE] Afficher la table ARP"
      debug:
        msg: "{{ arp_table.stdout_lines }}"

    # ════════════════════════════════════════════════════════════════════
    # 4. VÉRIFICATION FINALE
    # ════════════════════════════════════════════════════════════════════

    - name: "[CHECK] État de toutes les interfaces"
      command: net show interface all
      register: iface_all
      changed_when: false

    - name: "[CHECK] Afficher les interfaces"
      debug:
        msg: "{{ iface_all.stdout_lines }}"

    - name: "[CHECK] VLANs sur le bridge"
      command: bridge vlan show
      register: bridge_vlans
      changed_when: false

    - name: "[CHECK] Afficher les VLANs"
      debug:
        msg: "{{ bridge_vlans.stdout_lines }}"

    - name: "[CHECK] Résumé final SW3"
      debug:
        msg:
          - "════════════════════════════════════════════"
          - "  SW3 configuré — RÉSUMÉ"
          - "════════════════════════════════════════════"
          - "  Hostname        : {{ hostname }}"
          - "  Loopback        : {{ loopback_ip }}"
          - "  ip_forward      : 1 (routage actif)"
          - "  MLAG Role       : {{ mlag.role }}"
          - "  MLAG Sys-MAC    : {{ mlag.sys_mac }}"
          - "  Peerlink (SW4)  : {{ mlag.peerlink_ip }} ↔ {{ mlag.peer_ip }}"
          - "  Bond SW1 (swp1) : clag-id 1, VLAN 10,20"
          - "  Bond SW2 (swp2) : clag-id 2, VLAN 10,20"
          - "  SVI vlan10      : 192.168.1.254/24 (GW Machine1)"
          - "  SVI vlan20      : 192.168.2.254/24 (GW Machine2)"
          - "════════════════════════════════════════════"

  handlers:

    - name: Recharger la configuration réseau
      command: ifreload -a
      listen: "Recharger la configuration réseau"

    - name: Redémarrer clagd
      systemd:
        name: clagd
        state: restarted
      listen: "Redémarrer clagd"

    - name: Attendre la stabilisation réseau
      pause:
        seconds: 5
      listen: "Attendre la stabilisation réseau"

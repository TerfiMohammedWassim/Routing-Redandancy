# ═══════════════════════════════════════════════════════════════════════════
# PLAYBOOK AUTONOME — SW2 (Cumulus VX 4.x)
# Rôle : Access switch MLAG secondary
#
# Câblage :
#   swp1+swp2  → peerlink inter-chassis vers SW1
#   swp3       → Machine1 (membre bond_m1, clag-id 1, VLAN10)
#   swp4       → Machine2 (membre bond_m2, clag-id 2, VLAN20)
#   swp5       → SW3 swp2  ┐ bond_core dual-homed
#   swp6       → SW4 swp2  ┘ clag-id 10, trunk VLAN10+20
#
# Usage : ansible-playbook -i "IP_SW2," sw2.yml -u cumulus -k --become
# ═══════════════════════════════════════════════════════════════════════════
---
- name: Configuration complète SW2
  hosts: sw2
  gather_facts: false
  become: false

  vars:

    hostname: sw2
    loopback_ip: "10.10.10.2/32"

    mlag:
      role: secondary
      sys_mac: "44:38:39:FF:01:01"       # identique à SW1 — obligatoire
      peerlink_name: peerlink
      peerlink_members:
        - swp1
        - swp2
      peerlink_ip: "169.254.1.2/30"      # inversé par rapport à SW1
      peer_ip: "169.254.1.1"
      backup_ip: "10.10.10.1"            # loopback SW1 — keepalive OOB
      keepalive_ip: "10.10.10.2/32"

    mlag_bonds:
      - name: bond_m1
        slave: swp3
        clag_id: 1
        vlan: 10
        description: "Machine1 → VLAN10"
      - name: bond_m2
        slave: swp4
        clag_id: 2
        vlan: 20
        description: "Machine2 → VLAN20"

    uplink_bond:
      name: bond_core
      members:
        - swp5    # vers SW3 swp2
        - swp6    # vers SW4 swp2
      clag_id: 10
      description: "Uplink dual-homed SW3+SW4"

    bridge:
      name: bridge
      vids: "10,20"
      pvid: 1

    sysctl_settings:
      - name: net.ipv4.ip_forward
        value: "0"
      - name: net.core.netdev_max_backlog
        value: "1000"

  tasks:

    # ════════════════════════════════════════════════════════════════════
    # 0. GATHER DATE (sans gather_facts complet)
    # ════════════════════════════════════════════════════════════════════

    - name: "[PRE] Récupérer la date"
      setup:
        filter: ansible_date_time

    # ════════════════════════════════════════════════════════════════════
    # 1. PARAMÈTRES SYSTÈME
    # ════════════════════════════════════════════════════════════════════

    - name: "[SYS] Définir le hostname"
      hostname:
        name: "{{ hostname }}"

    - name: "[SYS] Mettre à jour /etc/hosts"
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ hostname }}"
        state: present

    - name: "[SYS] Appliquer les paramètres sysctl"
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-campus.conf
      loop: "{{ sysctl_settings }}"

    # ════════════════════════════════════════════════════════════════════
    # 2. INTERFACES RÉSEAU
    # ════════════════════════════════════════════════════════════════════

    - name: "[NET] Sauvegarder l'ancien fichier interfaces"
      copy:
        src: /etc/network/interfaces
        dest: "/etc/network/interfaces.bak.{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: true
      ignore_errors: true

    - name: "[NET] Déployer /etc/network/interfaces"
      copy:
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: '0644'
        content: |
          # /etc/network/interfaces — {{ hostname }}
          # Généré par Ansible — {{ ansible_date_time.date }}

          auto lo
          iface lo inet loopback
              address {{ loopback_ip }}

          auto eth0
          iface eth0 inet dhcp

          # ─────────────────────────────────────────────────────
          # PEERLINK inter-chassis SW2 ↔ SW1 (swp1+swp2)
          # ─────────────────────────────────────────────────────
          {% for port in mlag.peerlink_members %}
          auto {{ port }}
          iface {{ port }}

          {% endfor %}
          auto {{ mlag.peerlink_name }}
          iface {{ mlag.peerlink_name }}
              bond-slaves {{ mlag.peerlink_members | join(' ') }}
              bond-mode 802.3ad
              bond-miimon 100
              bond-lacp-rate fast
              bond-min-links 1

          auto {{ mlag.peerlink_name }}.4094
          iface {{ mlag.peerlink_name }}.4094
              clagd-enable yes
              clagd-peer-ip {{ mlag.peer_ip }}
              clagd-sys-mac {{ mlag.sys_mac }}
              clagd-priority 32768
              clagd-args --initDelay 0
              address {{ mlag.peerlink_ip }}

          # ─────────────────────────────────────────────────────
          # BONDS MLAG vers les machines (hôtes)
          # ─────────────────────────────────────────────────────
          {% for bond in mlag_bonds %}
          # {{ bond.description }}
          auto {{ bond.slave }}
          iface {{ bond.slave }}

          auto {{ bond.name }}
          iface {{ bond.name }}
              bond-slaves {{ bond.slave }}
              bond-mode 802.3ad
              bond-miimon 100
              bond-lacp-rate fast
              bond-min-links 1
              clag-id {{ bond.clag_id }}
              bridge-access {{ bond.vlan }}

          {% endfor %}
          # ─────────────────────────────────────────────────────
          # UPLINK dual-homed vers SW3 (swp5) et SW4 (swp6)
          # ─────────────────────────────────────────────────────
          # {{ uplink_bond.description }}
          {% for port in uplink_bond.members %}
          auto {{ port }}
          iface {{ port }}

          {% endfor %}
          auto {{ uplink_bond.name }}
          iface {{ uplink_bond.name }}
              bond-slaves {{ uplink_bond.members | join(' ') }}
              bond-mode 802.3ad
              bond-miimon 100
              bond-lacp-rate fast
              bond-min-links 1
              clag-id {{ uplink_bond.clag_id }}
              bridge-vids {{ bridge.vids }}

          # ─────────────────────────────────────────────────────
          # BRIDGE VLAN-aware
          # ─────────────────────────────────────────────────────
          auto {{ bridge.name }}
          iface {{ bridge.name }}
              bridge-vlan-aware yes
              bridge-ports {{ mlag_bonds | map(attribute='name') | join(' ') }} {{ uplink_bond.name }} {{ mlag.peerlink_name }}
              bridge-vids {{ bridge.vids }}
              bridge-pvid {{ bridge.pvid }}
              post-up bridge vlan add dev {{ bridge.name }} vid 10 self
              post-up bridge vlan add dev {{ bridge.name }} vid 20 self

    # ════════════════════════════════════════════════════════════════════
    # 3. RELOAD RÉSEAU — async pour éviter la coupure SSH
    # ════════════════════════════════════════════════════════════════════

    - name: "[NET] Sauvegarder l'IP eth0"
      shell: ip addr show eth0 | grep 'inet ' | awk '{print $2}' | cut -d/ -f1
      register: eth0_ip
      changed_when: false

    - name: "[NET] Sauvegarder la gateway eth0"
      shell: ip route show default | awk '/default/ {print $3}' | head -1
      register: eth0_gw
      changed_when: false

    - name: "[NET] Recharger les interfaces (async)"
      shell: |
        sleep 2
        ifreload -a || true
        ip addr show eth0 | grep -q '{{ eth0_ip.stdout }}' || \
          ip addr add {{ eth0_ip.stdout }}/24 dev eth0 || true
        ip route show default | grep -q default || \
          ip route add default via {{ eth0_gw.stdout }} || true
      async: 45
      poll: 0

    - name: "[NET] Attendre que SW2 revienne (15s)"
      pause:
        seconds: 15

    - name: "[NET] Vérifier que SW2 est joignable"
      wait_for_connection:
        timeout: 45

    # ════════════════════════════════════════════════════════════════════
    # 4. VÉRIFICATION MLAG
    # ════════════════════════════════════════════════════════════════════

    - name: "[MLAG] Vérifier l'état clagd"
      command: clagctl status
      register: clag_status
      changed_when: false
      ignore_errors: true

    - name: "[MLAG] Afficher l'état MLAG"
      debug:
        msg: "{{ clag_status.stdout_lines }}"

    - name: "[MLAG] Vérifier que le peer SW1 est alive"
      assert:
        that: "'peer is alive' in clag_status.stdout"
        fail_msg: "AVERTISSEMENT : peer SW1 non détecté"
        success_msg: "OK : peer SW1 détecté ✓"
      ignore_errors: true

    # ════════════════════════════════════════════════════════════════════
    # 5. VÉRIFICATION BRIDGE ET VLANs
    # ════════════════════════════════════════════════════════════════════

    - name: "[BRIDGE] État de toutes les interfaces"
      command: net show interface all
      register: iface_all
      changed_when: false
      ignore_errors: true

    - name: "[BRIDGE] Afficher les interfaces"
      debug:
        msg: "{{ iface_all.stdout_lines }}"

    - name: "[BRIDGE] VLANs sur le bridge"
      command: bridge vlan show
      register: bridge_vlans
      changed_when: false

    - name: "[BRIDGE] Afficher les VLANs"
      debug:
        msg: "{{ bridge_vlans.stdout_lines }}"

    - name: "[BRIDGE] Confirmer VLAN 10 et 20 présents"
      assert:
        that:
          - "'10' in bridge_vlans.stdout"
          - "'20' in bridge_vlans.stdout"
        fail_msg: "ERREUR : VLAN 10 ou 20 manquant sur le bridge"
        success_msg: "OK : VLAN 10 et 20 présents ✓"

    # ════════════════════════════════════════════════════════════════════
    # 6. RÉSUMÉ FINAL
    # ════════════════════════════════════════════════════════════════════

    - name: "[CHECK] Résumé final SW2"
      debug:
        msg:
          - "════════════════════════════════════════════"
          - "  SW2 configuré — RÉSUMÉ"
          - "════════════════════════════════════════════"
          - "  Hostname       : {{ hostname }}"
          - "  Loopback       : {{ loopback_ip }}"
          - "  MLAG rôle      : {{ mlag.role }}"
          - "  MLAG sys-mac   : {{ mlag.sys_mac }}"
          - "  Peerlink (SW1) : {{ mlag.peerlink_ip }} ↔ {{ mlag.peer_ip }}"
          - "  bond_m1 swp3   : clag-id 1 → VLAN10 (Machine1)"
          - "  bond_m2 swp4   : clag-id 2 → VLAN20 (Machine2)"
          - "  bond_core      : swp5→SW3 + swp6→SW4, clag-id 10"
          - "  Statut MLAG    : {{ 'peer alive ✓' if 'peer is alive' in clag_status.stdout else 'peer absent ✗' }}"
          - "════════════════════════════════════════════"
